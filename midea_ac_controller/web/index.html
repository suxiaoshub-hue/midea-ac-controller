<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>白熊TT自用空调控制系统</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div class="app-shell">
    <header class="hero">
      <div class="hero-copy">
        <div class="brand-title">
          <img class="brand-logo" src="./logo.png" alt="白熊TT" />
          <h1>白熊TT自用空调控制系统</h1>
        </div>
        <p>登录后自动同步设备状态与日志，控制会更顺手一些</p>
        <div id="versionBadge" class="version-badge">版本加载中</div>
      </div>
      <div class="hero-actions">
        <button id="btnLogin" class="primary">登录账号</button>
        <button id="btnRefresh">刷新全部设备</button>
      </div>
    </header>

    <section class="login-panel glass">
      <label class="field">
        <span>服务器</span>
        <input id="server" placeholder="服务器" value="美的美居" />
      </label>
      <label class="field">
        <span>账号</span>
        <input id="account" placeholder="账号" />
      </label>
      <label class="field">
        <span>密码</span>
        <input id="password" placeholder="密码" type="password" />
      </label>
      <label class="field">
        <span>代理(可选)</span>
        <input id="proxy" placeholder="代理(可选)" />
      </label>
    </section>

    <main class="dashboard">
      <section class="automation-panel glass">
        <div>
          <h2>自动开关空调</h2>
          <p id="autoPowerSummary">手动模式，自动开关不会下发指令</p>
        </div>
        <div class="automation-controls">
          <div class="mode-toggle" role="group" aria-label="自动开关模式">
            <button id="autoPowerManual" type="button" class="is-active" data-mode="manual">手动</button>
            <button id="autoPowerAuto" type="button" data-mode="auto">自动</button>
          </div>
          <label class="delay-field">
            <span>离线关机缓冲</span>
            <input id="autoPowerDelay" type="number" min="1" max="180" step="1" value="10" />
            <span>分钟</span>
          </label>
          <button id="btnSaveAutoPower" type="button">保存设置</button>
        </div>
      </section>
      <div class="status-row">
        <div id="statusBar" class="status-bar">未登录</div>
        <div id="syncBar" class="sync-bar">等待同步</div>
      </div>
      <section id="devices" class="device-grid"></section>
    </main>

    <section class="log-panel glass">
      <div class="panel-head">
        <h2>运行日志输出区</h2>
        <span>最近 5 条</span>
      </div>
      <pre id="logs"></pre>
    </section>
  </div>
  <script src="./renderer.js"></script>
</body>
</html>
