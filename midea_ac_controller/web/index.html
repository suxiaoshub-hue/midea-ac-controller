<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>美的美居多设备控制端</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div class="app-shell">
    <header class="hero">
      <div class="hero-copy">
        <h1>美的美居多设备控制端</h1>
        <p>登录后自动同步设备状态与日志，控制会更顺手一些</p>
      </div>
      <div class="hero-actions">
        <button id="btnLogin" class="primary">登录账号</button>
        <button id="btnRefresh">刷新全部设备</button>
      </div>
    </header>

    <section class="login-panel glass">
      <label class="field">
        <span>服务器</span>
        <input id="server" placeholder="服务器" value="美的美居" />
      </label>
      <label class="field">
        <span>账号</span>
        <input id="account" placeholder="账号" />
      </label>
      <label class="field">
        <span>密码</span>
        <input id="password" placeholder="密码" type="password" />
      </label>
      <label class="field">
        <span>代理(可选)</span>
        <input id="proxy" placeholder="代理(可选)" />
      </label>
    </section>

    <main class="dashboard">
      <div class="status-row">
        <div id="statusBar" class="status-bar">未登录</div>
        <div id="syncBar" class="sync-bar">等待同步</div>
      </div>
      <section id="devices" class="device-grid"></section>
    </main>

    <section class="log-panel glass">
      <div class="panel-head">
        <h2>运行日志输出区</h2>
        <span>最近 5 条</span>
      </div>
      <pre id="logs"></pre>
    </section>
  </div>
  <script src="./renderer.js"></script>
</body>
</html>
